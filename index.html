<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main>
        <div id="best" class="best">
            <div id="best-parent" class="best-parent">
            <input id="textinput" type="text" placeholder="enter city name"></input>
           
            <button id="search"><img class="search" src="./image.png" alt=""></button>
        </div>
        <div id="city-sec" class="city-sec">
            <div id="city" class="city">CITY</div>
        </div>
        <div id="degree-sec" class="degree-sec">
            <div id="minus" class="minus">
             <span id="degree" class="degree">--</span>
             <span id="reduce" class="reduce">ºC</span>
            </div>
        </div>
        <div id="temp-sec" class="temp-sec">
            <div id="temp" class="temp">
                <span>Temperature</span>
            </div>
        </div>
        <div id="last-con-sec" class="last-con-sec">
            <div id="last-con" class="last-con">
                <div id="con-one" class="con-one">
                    <span id="zero" class="zero">0%</span>
                    <span id="Humidity" class="Humidity">Humidity</span>
                </div>
                <div id="con-one" class="con-one">
                    <span id="pos" class="pos">0 Km/ph</span>
                    <span id="wind" class="wind">Wind</span>
                </div>
                <div id="con-one" class="con-one">
                    <span id="bos" class="bos">0º</span>
                    <span id="feel" class="feel">feels like</span>
                </div>
                <div id="con-one" class="con-one">
                    <span id="cos" class="cos">0 Km</span>
                    <span id="visi" class="visi">Visibility</span>
                </div>
                <div id="con-one" class="con-one">
                    <span id="dos" class="dos">0 hPa</span>
                    <span id="pres" class="pres">Pressure</span>
                </div>
                <div id="con-one" class="con-one">
                    <span id="eos" class="eos">0 mw</span>
                    <span id="uv" class="uv">UV index</span>
                </div>
            </div>
        </div>
        </div>
    
    </main>

    <script src="./script.js"></script>
</body>
</html>
